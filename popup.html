<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<div id="app">

  <!-- LOGIN -->
  <div id="login-view" style="display:none;">
    <h3>Login</h3>
    <input type="text" id="username" placeholder="Usuário">
    <input type="password" id="password" placeholder="Senha">
    <button id="btn-login">Entrar</button>
  </div>

  <!-- LOGADO -->
  <div id="logado-view" style="display:none;">
    <div id="notifications"></div>
    <h3>🟢 Conectado</h3>
    <div id="info-usuario"></div>
    <div id="tempo"></div>
    <button id="abrirDashboard">Abrir Gerenciador</button>
    <button id="coletarInformacoes">Coletar Informações desse curso</button>
    <br><br><button id="btn-logout">Sair</button>
  </div>

</div>

<script src="popup.js"></script>
</body>
</html>
